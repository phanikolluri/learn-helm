apiVersion: v1
kind: ConfigMap
metadata:
  name: helm-02
data:
  release_number: {{ quote .Values.Release_Number }}
  my_name: {{ .Values.my_name | upper }}
  my_age: {{ .Values.my_age | quote}}
{{ if eq (int .Values.Release_Number) 100 }}
  my_number_if: {{ quote .Values.Release_Number }}
{{ end }}
  x: 2000

apiVersion: v1
kind: ConfigMap
metadata:
  name: helm-02
data:
{{ - if eq (int .Values.Release_Number) 100 }}
  my_number_if: {{ quote .Values.Release_Number }}
{{ - end }}
  x: 1000






  




